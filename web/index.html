<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <meta name="description" content="In-Vite App" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="iv_project_web_app" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>iv_project_web_app</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      body { margin: 0; padding: 0; background-color: #ffffff; }
      
      .container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        overflow: hidden;
        box-sizing: border-box;
      }

      .progress-container {
        width: 260px; 
        height: 10px;
        background-color: #f0f0f0;
        border-radius: 20px;
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background-color: #02569B;
        transition: width 0.3s ease-out;
      }

      #status_text {
        margin-top: 24px;
        font-size: 16px;
        color: #444444;
        font-family: sans-serif;
        font-weight: 600;
      }

      #progress_text {
        margin-top: 8px;
        font-size: 14px;
        color: #888888;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading_indicator" class="container">
      <div class="progress-container">
        <div id="progress_bar" class="progress-fill"></div>
      </div>
      <p id="status_text">Initializing engine...</p>
      <p id="progress_text">0%</p>
    </div>

    <script>
      {{flutter_bootstrap_js}}
    </script>
  </body>
</html>
