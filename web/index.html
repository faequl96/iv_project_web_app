<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="iv_project_web_app" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>iv_project_web_app</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      body { margin: 0; padding: 0; background-color: #ffffff; }
      
      .container {
        width: 100vw; height: 100vh;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        transition: opacity 0.4s ease-out;
      }

      .progress-container {
        width: 280px; height: 6px;
        background-color: #f0f0f0;
        border-radius: 10px; overflow: hidden;
      }

      .progress-fill {
        width: 0%; height: 100%;
        background-color: #02569B;
        transition: width 0.2s ease;
      }

      #status_text { margin-top: 20px; font-size: 14px; color: #666; font-weight: 500; }
      #progress_text { margin-top: 5px; font-size: 12px; color: #999; }
    </style>
  </head>
  <body>
    <div id="loading_indicator" class="container">
      <div class="progress-container">
        <div id="progress_bar" class="progress-fill"></div>
      </div>
      <p id="status_text">Initializing engine...</p>
      <p id="progress_text">0%</p>
    </div>

    <script src="flutter_bootstrap.js" async></script>

    <script>
      const progressBar = document.getElementById('progress_bar');
      const progressText = document.getElementById('progress_text');
      const statusText = document.getElementById('status_text');
      const loaderWrapper = document.getElementById('loading_indicator');

      _flutter.loader.load({
        onProgress: function(value) {
          const percent = Math.round(value * 100);
          
          if (progressBar) progressBar.style.width = percent + '%';
          if (progressText) progressText.textContent = percent + '%';

          if (statusText) {
            if (percent < 40) statusText.textContent = "Downloading engine...";
            else if (percent < 80) statusText.textContent = "Preparing assets...";
            else statusText.textContent = "Finalizing...";
          }
        },
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
        
          if (loaderWrapper) {
            loaderWrapper.style.opacity = '0';
            setTimeout(() => loaderWrapper.remove(), 400);
          }
          
          await appRunner.runApp();
        }
      });
    </script>
  </body>
</html>
