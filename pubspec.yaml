name: iv_project_web_app
description: "In Vite Project Web App"
publish_to: "none"
version: 0.1.7

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  iv_project_model:
    git:
      url: https://github.com/faequl96/iv_project_model.git
      ref: 0.1.4+2

  iv_project_web_data:
    git:
      url: https://github.com/faequl96/iv_project_web_data.git
      ref: 0.2.4+5

  iv_project_core:
    git:
      url: https://github.com/faequl96/iv_project_core.git
      ref: 0.1.5+3

  iv_project_widget_core:
    git:
      url: https://github.com/faequl96/iv_project_widget_core.git
      ref: 0.0.7+2

  iv_project_invitation_theme:
    git:
      url: https://github.com/faequl96/iv_project_invitation_theme.git
      ref: 0.2.7+5

  quick_dev_sdk:
    git:
      url: https://github.com/faequl96/quick_dev_sdk.git
      ref: 0.1.2+4

  go_router: ^17.2.3
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

